model: glm-4.7-flash
label: glm-4.7-flash（文本模型）
model_type: chat
features:
  #  - tool_call        # 支持函数调用
  - agent_thought    # 支持推理
  - image_input # 支持多模态输入
context_window: 200000
max_output_tokens: 128000  # 默认最大输出
attributes:
  model: glm-4.7-flash
parameters:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
    min: 0.1
    default: 0.1
  - name: max_tokens  # 对应 OpenAI 的 max_completion_tokens
    label: 最大标记
    type: int
    default: 8000
    help: 要生成的标记的最大数量，类型为整型
    min: 1
    max: 128000
metadata:
  pricing:
    input: 0.0
    output: 0.0
    unit: 0.001
    currency: RMB