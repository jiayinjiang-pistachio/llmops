model: deepseek-chat
label: DeepSeek-V3.2（非思考模式）
model_type: chat
features:
  - tool_call
  - image_input
context_window: 128000
max_output_tokens: 8000
attributes:
  model: deepseek-chat
parameters:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    label: 最大标记
    type: int
    default: 4096
    min: 1
    max: 8000
    help: 要生成的标记的最大数量，类型为整型