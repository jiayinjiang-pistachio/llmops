model: deepseek-reasoner
label: DeepSeek-V3.2（思考模式）
model_type: chat
features:
  - agent_thought
context_window: 128000
max_output_tokens: 64000
attributes:
  model: deepseek-reasoner
parameters:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    default: 32000
    min: 1
    max: 64000
    type: int
    label: 最大标记
    help: 要生成的标记的最大数量，类型为整型
metadata:
  pricing:
    input: 0.002
    output: 0.03
    unit: 0.001
    currency: RMB