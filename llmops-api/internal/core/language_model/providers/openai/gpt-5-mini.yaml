model: gpt-5-mini
label: gpt-5-mini
model_type: chat
features:
  - tool_call
  - agent_thought
  - image_input
context_window: 128000
max_output_tokens: 16384
attributes:
  model: gpt-5-mini
parameters:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
    min: 0.1
    default: 0.1
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_completion_tokens
    default: 4096
metadata:
  pricing:
    input: 0.00181
    output: 0.0145
    unit: 0.001
    currency: RMB